        function selectAll() { const platformData = getCurrentPlatformData(); selectedSKUs = new Set(platformData.map((_, i) => i)); document.querySelectorAll('.sku-item').forEach(item => { item.classList.add('selected'); item.querySelector('input').checked = true; }); updateChart(); }
        function deselectAll() { selectedSKUs.clear(); document.querySelectorAll('.sku-item').forEach(item => { item.classList.remove('selected'); item.querySelector('input').checked = false; }); updateChart(); }
        function filterSKU() { const searchTerm = document.getElementById('searchBox').value.toLowerCase(), items = document.querySelectorAll('.sku-item'), platformData = getCurrentPlatformData(); platformData.forEach((item, index) => { items[index].style.display = item.sku.toLowerCase().includes(searchTerm) ? 'flex' : 'none'; }); }
        function getAllWeeks() { const weekSet = new Set(), platformData = getCurrentPlatformData(); selectedSKUs.forEach(index => { platformData[index].weeks.forEach(week => weekSet.add(week)); }); return Array.from(weekSet).sort((a, b) => parseInt(a.match(/\d+/)[0]) - parseInt(b.match(/\d+/)[0])); }
        function getPhaseAnnotations(allWeeks, yMax) {
            const annotations = {}, platformCycle = getCurrentCycleData(), platformData = getCurrentPlatformData();
            // 使用与图例完全一致的颜色 - 降低透明度使颜色更浅
            const phaseColors = { 
                '未启动': 'rgba(200, 200, 200, 0.20)', 
                '启动期': 'rgba(255, 224, 130, 0.25)', 
                '爆发期': 'rgba(129, 199, 132, 0.25)', 
                '增长期': 'rgba(77, 208, 225, 0.25)', 
                '成熟期': 'rgba(121, 134, 203, 0.25)', 
                '下降期': 'rgba(255, 138, 101, 0.25)', 
                '衰退期': 'rgba(240, 98, 146, 0.25)' 
            };
            const phaseLabelColors = { '未启动': 'rgba(100, 100, 100, 1)', '启动期': 'rgba(180, 135, 0, 1)', '爆发期': 'rgba(46, 125, 50, 1)', '增长期': 'rgba(0, 131, 143, 1)', '成熟期': 'rgba(26, 35, 126, 1)', '下降期': 'rgba(191, 54, 12, 1)', '衰退期': 'rgba(173, 20, 87, 1)' };
            selectedSKUs.forEach(index => {
                const sku = platformData[index].sku, skuCycle = platformCycle[sku];
                if (skuCycle) { 
                    for (const [phase, rangeList] of Object.entries(skuCycle)) { 
                        // rangeList 现在是数组，支持多段区间
                        if (!Array.isArray(rangeList)) continue;
                        rangeList.forEach((range, rangeIdx) => {
                            if (range[0] <= allWeeks.length && range[1] >= 1) { 
                                const centerX = (range[0] + range[1]) / 2;
                                const centerY = yMax * 0.5;
                                const suffix = rangeIdx > 0 ? `_${rangeIdx}` : '';
                                // 背景区域
                                annotations[`phase${index}_${phase}${suffix}`] = { 
                                    type: 'box', 
                                    xMin: range[0] - 0.5, 
                                    xMax: range[1] + 0.5, 
                                    backgroundColor: phaseColors[phase], 
                                    borderColor: 'transparent'
                                };
                                // 时期标注 - 每段时间都显示时期名称（多段时加序号）
                                const labelContent = rangeIdx > 0 ? `${phase}(${rangeIdx + 1})` : phase;
                                annotations[`label_${index}_${phase}${suffix}`] = {
                                    type: 'label',
                                    xValue: centerX,
                                    yValue: centerY,
                                    content: labelContent,
                                    font: { size: 12, weight: 'bold' },
                                    color: phaseLabelColors[phase],
                                    backgroundColor: 'rgba(255,255,255,0.8)',
                                    padding: { x: 6, y: 3 },
                                    borderRadius: 4,
                                    borderWidth: 1,
                                    borderColor: phaseLabelColors[phase]
                                };
                                // 添加转折点标注（阶段边界）- 放在底部
                                const endWeek = range[1];
                                if (endWeek < allWeeks.length) {
                                    annotations[`turning_${index}_${phase}${suffix}`] = {
                                        type: 'label',
                                        xValue: endWeek + 0.5,
                                        yValue: yMax * 0.05,
                                        content: `第${endWeek}周`,
                                        font: { size: 9, weight: 'normal' },
                                        color: 'rgba(80, 80, 80, 0.9)',
                                        backgroundColor: 'rgba(255,255,255,0.8)',
                                        padding: { x: 4, y: 2 },
                                        borderRadius: 3
                                    };
                                }
                            }
                        });
                    } 
                }
            });
            return annotations;
        }
        function updateChart() {
            if (selectedSKUs.size === 0) { if (chart) { chart.destroy(); chart = null; } document.getElementById('statsContainer').innerHTML = ''; return; }
            const selectedIndices = Array.from(selectedSKUs).sort((a, b) => a - b), allWeeks = getAllWeeks(), colors = generateColors(selectedIndices.length), platformData = getCurrentPlatformData(), datasets = [];
            let maxValue = 0;
            selectedIndices.forEach((index, colorIndex) => {
                const item = platformData[index], dataMap = new Map(); item.weeks.forEach((week, i) => dataMap.set(week, item.values[i]));
                const data = allWeeks.map((week, weekIdx) => ({ x: weekIdx + 1, y: dataMap.get(week) || null }));
                const itemMax = Math.max(...item.values);
                if (itemMax > maxValue) maxValue = itemMax;
                datasets.push({ label: item.sku, data: data, borderColor: colors[colorIndex], backgroundColor: colors[colorIndex] + '30', borderWidth: 2, pointRadius: 3, pointHoverRadius: 5, tension: 0.3, fill: false, spanGaps: true });
            });
            const yMax = maxValue * 1.1; // 留出10%空间
            const ctx = document.getElementById('salesChart').getContext('2d'); if (chart) chart.destroy();
            chart = new Chart(ctx, { type: 'line', data: { labels: allWeeks, datasets: datasets }, options: { responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false }, plugins: { legend: { position: 'top', labels: { usePointStyle: true, padding: 10, font: { size: 10 } } }, tooltip: { backgroundColor: 'rgba(0,0,0,0.85)', titleFont: { size: 12 }, bodyFont: { size: 11 }, padding: 8 }, annotation: { annotations: getPhaseAnnotations(allWeeks, yMax) } }, scales: { x: { title: { display: true, text: '上市周期', font: { size: 12, weight: 'bold' } }, ticks: { maxRotation: 45, autoSkip: true, maxTicksLimit: 20, font: { size: 10 } } }, y: { title: { display: true, text: '销量', font: { size: 12, weight: 'bold' } }, beginAtZero: true, max: yMax, ticks: { font: { size: 10 }, callback: function(value) { return value.toLocaleString(); } } } } } });
            updateStats();
        }
        function updateStats() { const statsContainer = document.getElementById('statsContainer'), platformData = getCurrentPlatformData(); let totalSales = 0, maxSales = 0, maxSKU = ''; selectedSKUs.forEach(index => { const item = platformData[index]; totalSales += item.values.reduce((a, b) => a + b, 0); const max = Math.max(...item.values); if (max > maxSales) { maxSales = max; maxSKU = item.sku; } }); const avgSales = selectedSKUs.size > 0 ? Math.round(totalSales / selectedSKUs.size) : 0; statsContainer.innerHTML = `<div class="stat-card"><div class="stat-value">${selectedSKUs.size}</div><div class="stat-label">选中SKU数量</div></div><div class="stat-card"><div class="stat-value">${totalSales.toLocaleString()}</div><div class="stat-label">总销量</div></div><div class="stat-card"><div class="stat-value">${avgSales.toLocaleString()}</div><div class="stat-label">平均销量/SKU</div></div><div class="stat-card"><div class="stat-value">${maxSales.toLocaleString()}</div><div class="stat-label">最高单周销量 (${maxSKU || '-'})</div></div>`; }
        window.onload = function() { initSKUSelector(); updateChart(); };
    </script>
</body>
